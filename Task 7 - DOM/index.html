<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <link rel="shortcut icon" href="./virtual-piano.webp" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Virtual Piano</h1>
    <div class="piano">
        <div id="whiteKeys">
            <ul>
                <li id="y">Y</li>
                <li id="u">U</li>
                <li id="i">I</li>
                <li id="o">O</li>
                <li id="p">P</li>
                <li id="a">A</li>
                <li id="s">S</li>
                <li id="d">D</li>
                <li id="f">F</li>
                <li id="g">G</li>
                <li id="h">H</li>
                <li id="j">J</li>
                <li id="k">K</li>
                <li id="l">L</li>
                <li id="z">Z</li>
                <li id="x">X</li>
                <li id="c">C</li>
                <li id="v">V</li>
                <li id="b">B</li>
                <li id="n">N</li>
                <li id="m">M</li>
            </ul>
        </div>

        <div id="blackKeys">
            <ul>
                <div class="upperkey">
                    <li id="1">1</li>
                    <li id="2">2</li>
                </div>
               
                <div class="upperkey">
                    <li id="3">3</li>
                    <li id="4">4</li>
                    <li id="5">5</li>
                </div>
                
                <div class="upperkey">
                    <li id="6">6</li>
                    <li id="7">7</li>
                </div>
                
                <div class="upperkey">
                    <li id="8">8</li>
                    <li id="9">9</li>
                    <li id="0">0</li>
                </div>
                
                <div class="upperkey">
                    <li id="q">Q</li>
                    <li id="w">W</li>
                </div>
                
                <div class="upperkey">
                    <li id="e">E</li>
                    <li id="r">R</li>
                    <li id="t">T</li>
                </div>  
            </ul>
        </div>

    </div>
    <script src="scripts.js"></script>
</body>
</html>
